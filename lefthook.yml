# Validate content before committing
pre-commit:
  jobs:
    - name: format
      run: pnpm exec prettier --write {staged_files}
      glob:
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.mts'
        - '**/*.mjs'
      stage_fixed: true
    - name: lint
      run: pnpm exec eslint --max-warnings 0 {staged_files}
      glob:
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
      stage_fixed: true
    - name: typecheck
      run: pnpm typecheck
    - name: knip
      glob: '*'
      run: pnpm run check:deps
