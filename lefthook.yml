# Validate content before committing
pre-commit:
  jobs:
    - name: format
      run: pnpm exec prettier --write {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.mts"
        - "**/*.mjs"
        - "**/*.json"
        - "**/*.md"
        - "**/*.css"
        - "**/*.yml"
        - "**/*.yaml"
      stage_fixed: true
    - name: lint
      run: pnpm exec eslint --max-warnings 0 {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
      stage_fixed: true

# Run slower project-wide checks before pushing
pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: knip
      run: pnpm run check:deps
