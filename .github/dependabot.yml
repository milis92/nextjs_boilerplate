version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 30
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-type: direct
    groups:
      patch:
        update-types:
          - patch
      minor:
        update-types:
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
    commit-message:
      prefix: "chore(deps)"
    groups:
      patch:
        update-types:
          - patch
      minor:
        update-types:
          - minor
